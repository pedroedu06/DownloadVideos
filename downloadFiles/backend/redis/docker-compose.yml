version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: downloadfiles-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --tcp-keepalive 300
      --timeout 0
      --loglevel notice
    volumes:
      - redis-data:/data
    networks:
      - downloadfiles-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

volumes:
  redis-data:
    driver: local

networks:
  downloadfiles-net:
    driver: bridge
