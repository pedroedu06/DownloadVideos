services:
  node_service:
    build: ./node_service
    container_name: node_service
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/feed || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
